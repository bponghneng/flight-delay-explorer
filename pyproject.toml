[project]
name = "myproject"
version = "0.1.0"
description = "A new Python project scaffolded with pandas, matplotlib, argparse."
authors = [
    { name="Your Name", email="your.email@example.com" }
]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pandas",
    "matplotlib",
    "argparse"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "black",
    "ruff",
    "mypy"
]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.ruff]
line-length = 88
target-version = "py38"

[tool.mypy]
python_version = 3.8
strict = true

[tool.pytest.ini_options]
addopts = "--cov=src"
testpaths = [
    "tests"
]
